server {
    listen 80;
    server_name _;

    # HTML 文件放在 /usr/share/nginx/html/html/ 子目录下,保持 ../js/ 等相对路径正确
    root /usr/share/nginx/html;
    index index.html;

    # 根级别 .html 请求映射到 /html/ 子目录
    location ~* ^/([^/]+\.html)$ {
        try_files /html/$1 =404;
    }

    # 根路径重定向到 html/index.html
    location = / {
        try_files /html/index.html =404;
    }

    # 前端静态文件（js/css/assets 直接从根目录提供）
    location / {
        # 直接尝试请求路径（非 .html 文件 => 从 root 直接提供）
    }

    # Proxy API requests to backend
    location /api/ {
    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源不强制缓存(避免部署后浏览器强缓存老 JS)
    # HTML 默认不缓存,JS/CSS 走 no-cache 让浏览器每次重新校验
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    # 纯静态资源(图标 / 字体)可以缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
