<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../assets/presets/logo透明.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChaosBuilder · Page Launcher</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <style>
    .launcher {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
    }

    .lang-toggle {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 200;
    }

    .launcher-logo {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 500;
      color: var(--fg);
      margin-bottom: var(--space-3);
    }

    .launcher-sub {
      font-size: var(--text-lg);
      color: var(--muted);
      max-width: 48ch;
      margin: 0 auto var(--space-8);
    }

    .launcher-grid {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-4);
      width: 100%;
      max-width: 960px;
    }

    .launcher-grid.active {
      display: grid;
    }

    @media (max-width: 640px) {
      .launcher-grid {
        grid-template-columns: 1fr;
      }
    }

    .auth-guest {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
    }

    .auth-guest.active {
      display: flex;
    }

    .auth-guest .launcher-logo {
      margin-bottom: var(--space-4);
    }

    .auth-guest .launcher-sub {
      margin-bottom: var(--space-8);
    }

    .auth-guest .btn-primary {
      padding: var(--space-4) var(--space-8);
      font-size: var(--text-lg);
    }

    .launcher-welcome {
      display: none;
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .launcher-welcome.active {
      display: block;
    }

    .launcher-welcome h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-2);
    }

    .launcher-welcome p {
      color: var(--muted);
    }

    /* Entry motion */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .launcher-logo,
    .launcher-sub,
    .auth-guest.active,
    .launcher-welcome.active,
    .launcher-grid.active .launcher-card {
      opacity: 0;
      animation: fadeUp 0.55s cubic-bezier(0.2, 0, 0, 1) forwards;
    }

    .launcher-logo { animation-delay: 0.05s; }
    .launcher-sub { animation-delay: 0.12s; }
    .auth-guest.active { animation-delay: 0.2s; }
    .launcher-welcome.active { animation-delay: 0.2s; }

    .launcher-grid.active .launcher-card:nth-child(1) { animation-delay: 0.22s; }
    .launcher-grid.active .launcher-card:nth-child(2) { animation-delay: 0.29s; }
    .launcher-grid.active .launcher-card:nth-child(3) { animation-delay: 0.36s; }
    .launcher-grid.active .launcher-card:nth-child(4) { animation-delay: 0.43s; }
    .launcher-grid.active .launcher-card:nth-child(5) { animation-delay: 0.5s; }
    .launcher-grid.active .launcher-card:nth-child(6) { animation-delay: 0.57s; }

    .launcher-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      padding: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--elev-raised);
      text-decoration: none;
      color: var(--fg);
      transition: transform var(--motion-base) var(--ease-standard),
                  box-shadow var(--motion-base) var(--ease-standard);
    }

    .launcher-card:hover {
      transform: translateY(-4px);
      box-shadow: rgba(0, 0, 0, 0.08) 0px 12px 36px;
      text-decoration: none;
      color: var(--fg);
    }

    .launcher-card:hover .arrow {
      transform: translateX(4px);
    }

    .launcher-card:active {
      transform: translateY(-1px) scale(0.992);
    }

    .launcher-card .icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      color: var(--accent);
      transition: background-color var(--motion-fast) var(--ease-standard),
                  color var(--motion-fast) var(--ease-standard);
    }

    .launcher-card:hover .icon {
      background: var(--accent);
      color: var(--accent-on);
    }

    .launcher-card h3 {
      font-size: var(--text-xl);
      margin-bottom: var(--space-2);
    }

    .launcher-card p {
      font-size: var(--text-sm);
      color: var(--muted);
      line-height: 1.5;
    }

    .launcher-card .arrow {
      margin-top: auto;
      padding-top: var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--accent);
      transition: transform var(--motion-fast) var(--ease-standard);
    }

    .launcher-footer {
      position: relative;
      z-index: 1;
      margin-top: var(--space-8);
      font-size: var(--text-sm);
      color: var(--meta);
    }

    /* Page transition: index -> landing */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 500ms var(--ease-standard);
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }

    body.is-leaving .launcher {
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 420ms var(--ease-standard), transform 420ms var(--ease-standard);
    }

    body.is-entering .launcher {
      opacity: 0;
      transform: scale(1.012);
      animation: enterPage 650ms cubic-bezier(0.2, 0, 0, 1) 80ms forwards;
    }

    @keyframes enterPage {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .launcher {
      position: relative;
      z-index: 1;
    }

    .auth-guest {
      position: relative;
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      overflow: hidden;
      isolation: isolate;
    }

    .auth-guest::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(250, 249, 245, 0.7);
      -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 45%, transparent 100%);
      mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 45%, transparent 100%);
      z-index: -1;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .launcher-logo,
      .launcher-sub,
      .auth-guest.active,
      .launcher-welcome.active,
      .launcher-grid.active .launcher-card {
        animation: none;
        opacity: 1;
      }

      .launcher-card,
      .launcher-card .arrow,
      .launcher-card .icon {
        transition: none;
      }

      .launcher-card:hover,
      .launcher-card:active {
        transform: none;
      }

      .bg-canvas {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="user-menu" id="user-menu"></div>
  <div class="lang-toggle">
    <button type="button" class="btn btn-secondary" id="lang-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="langSwitch" data-i18n="langEn">
      EN
    </button>
  </div>
  <main class="launcher">

      <p class="launcher-sub">

        <span data-i18n="brandTagline">为创作者打造的 AI 图像生成套件。</span>
      </p>
      <button type="button" class="btn btn-primary" id="login-start-btn" data-i18n="authStartCreating">登录并开始创作</button>
    </div>

    <div class="launcher-welcome" id="launcher-welcome">

    </div>

        </div>

        <span class="arrow" data-i18n="indexEnter">进入 →</span>
      </a>

      <a href="preset-styles.html" class="launcher-card">
        <div class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><path d="M9 21h6"/></svg>
        </div>

        <span class="arrow" data-i18n="indexEnter">进入 →</span>
      </a>

      <a href="settings.html" class="launcher-card">
        <div class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
        <h3 data-i18n="indexSettingsTitle">设置</h3>

        </div>

        <p data-i18n="indexTextToImageDesc">输入提示词，调整参数，一键生成高质量创意图片。</p>
        <span class="arrow" data-i18n="indexEnter">进入 →</span>

          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>

      </a>

      <a href="generate.html" class="launcher-card">
        <div class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </div>
        <h3 data-i18n="indexMultiImageTitle">多图生图</h3>
        <p data-i18n="indexMultiImageDesc">融合多张参考图的构图、角色与风格，生成统一画面。</p>

    <footer class="launcher-footer">Design By ECHOHAORAN</footer>

  <div class="page-transition" id="page-transition" aria-hidden="true"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      const btn = document.getElementById('lang-toggle');
      const loginBtn = document.getElementById('login-start-btn');
      const titleEl = document.querySelector('title');
      const guestPanel = document.getElementById('auth-guest');
      const welcomePanel = document.getElementById('launcher-welcome');
      const grid = document.getElementById('launcher-grid');
      const welcomeText = document.getElementById('welcome-text');
      const transition = document.getElementById('page-transition');
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function updateTitle() {
        const brand = I18N.t('brandName');
        const page = I18N.t('indexTitle');
        titleEl.textContent = brand + ' · ' + page;
      }

      function updateToggleLabel() {
        const next = I18N.locale() === 'zh-CN' ? 'en' : 'zh-CN';
        btn.textContent = next === 'zh-CN' ? I18N.t('langZh') : I18N.t('langEn');
      }

      function updateAuthState() {
        const user = Auth.getCurrentUser();
        Auth.renderUserMenu('#user-menu');
        if (user) {
          guestPanel.classList.remove('active');
          welcomePanel.classList.add('active');
          grid.classList.add('active');
          welcomeText.textContent = I18N.t('authWelcome', '欢迎，{name}', { name: user.username || user.name });
        } else {
          guestPanel.classList.add('active');
          welcomePanel.classList.remove('active');
          grid.classList.remove('active');
        }
      }

      function goToLanding() {
        if (prefersReduced) {
          window.location.href = 'landing.html?from=login';
          return;
        }
        document.body.classList.add('is-leaving');
        transition.classList.add('active');
        setTimeout(function () {
          window.location.href = 'landing.html?from=login';
        }, 520);
      }

      let isTransitioning = false;

      function goToLandingOnce() {
        if (isTransitioning) return;
        isTransitioning = true;
        goToLanding();
      }

      if (loginBtn) {
        loginBtn.addEventListener('click', function (e) {
          e.preventDefault();
          Auth.showLoginModal();
        });
      }

      btn.addEventListener('click', function () {
        I18N.toggle();
      });

      document.addEventListener('i18n:changed', function () {
        updateTitle();
        updateToggleLabel();
      });

      document.addEventListener('auth:changed', function (e) {
        if (e.detail && e.detail.reason === 'login') {
          goToLandingOnce();
          return;
        }
        updateAuthState();
      });

      updateTitle();
      updateToggleLabel();
      updateAuthState();
      if (window.I18N) I18N.apply();

      // Enter animation when returning from landing logout
      if (document.referrer.indexOf('landing.html') !== -1 && !prefersReduced) {
        document.body.classList.add('is-entering');
      }
    })();
  </script>

  <script>
    (function () {
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;

      const canvas = document.createElement('canvas');
      canvas.className = 'bg-canvas';
      canvas.setAttribute('aria-hidden', 'true');
      document.body.insertBefore(canvas, document.body.firstChild);

      const ctx = canvas.getContext('2d');
      const maskCanvas = document.createElement('canvas');
      const mctx = maskCanvas.getContext('2d');

      const img = new Image();
      img.src = '../assets/presets/perfume.png';
      let loaded = false;
      img.onload = function () { loaded = true; };

      let w = 0, h = 0, dpr = 1;
      let spots = [];
      let cursor = { x: -1000, y: -1000, has: false };

      function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        maskCanvas.width = canvas.width;
        maskCanvas.height = canvas.height;
        mctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function addSpot(x, y) {
        spots.push({
          x: x,
          y: y,
          born: performance.now(),
          life: 600,
          maxR: 240
        });
      }

      function updateMask() {
        const now = performance.now();
        spots = spots.filter(function (s) { return now - s.born < s.life; });

        mctx.clearRect(0, 0, w, h);
        spots.forEach(function (s) {
          const age = now - s.born;
          const p = age / s.life;
          const alpha = 1 - p;
          const r = 32 + (s.maxR - 32) * p;

          const g = mctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
          g.addColorStop(0, 'rgba(255,255,255,' + alpha + ')');
          g.addColorStop(0.55, 'rgba(255,255,255,' + (alpha * 0.35) + ')');
          g.addColorStop(1, 'rgba(255,255,255,0)');

          mctx.fillStyle = g;
          mctx.fillRect(s.x - r, s.y - r, r * 2, r * 2);
        });
      }

      function draw() {
        if (!loaded || !w || !h) return;

        ctx.clearRect(0, 0, w, h);

        const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
        const dw = img.naturalWidth * scale;
        const dh = img.naturalHeight * scale;
        const dx = (w - dw) / 2;
        const dy = (h - dh) / 2;
        ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, dx, dy, dw, dh);

        ctx.globalCompositeOperation = 'destination-in';
        ctx.drawImage(maskCanvas, 0, 0, w, h);
        ctx.globalCompositeOperation = 'source-over';
      }

      function loop() {
        updateMask();
        draw();
        requestAnimationFrame(loop);
      }

      function onPointer(x, y) {
        if (!cursor.has) {
          cursor.x = x;
          cursor.y = y;
          cursor.has = true;
          addSpot(x, y);
          return;
        }

        const dx = x - cursor.x;
        const dy = y - cursor.y;
        const dist = Math.hypot(dx, dy);
        const step = 8;

        if (dist > step) {
          const steps = Math.max(1, Math.floor(dist / step));
          for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            addSpot(cursor.x + dx * t, cursor.y + dy * t);
          }
          cursor.x = x;
          cursor.y = y;
        }
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', function (e) { onPointer(e.clientX, e.clientY); });
      window.addEventListener('touchmove', function (e) {
        const t = e.touches[0];
        if (t) onPointer(t.clientX, t.clientY);
      }, { passive: true });
      window.addEventListener('touchstart', function (e) {
        const t = e.touches[0];
        if (t) onPointer(t.clientX, t.clientY);
      }, { passive: true });

      resize();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
