<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../assets/presets/logo透明.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>混沌艺术 · 文生图</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <style>
    .lang-toggle {
    }

    .page-header {
      padding-top: 120px;
      padding-bottom: var(--space-8);
      text-align: center;
    }

    .page-header h1 {
      margin-bottom: var(--space-4);
    }

    .page-header .lead {
      margin: 0 auto;
    }

    .generator {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: var(--space-8);
      align-items: stretch;
      margin-bottom: var(--section-y-desktop);
    }

    .generator-panel,
    .generator-result {
      height: 100%;
    }

    .generator-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--elev-raised);
      position: sticky;
      top: 88px;
      display: flex;
      flex-direction: column;
    }

    .generator-panel .field + .field {
      margin-top: var(--space-5);
    }

    .generator-panel .btn-primary {
      width: 100%;
      margin-top: var(--space-6);
    }

    .generator-result {
      min-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--elev-raised);
    }

    .result-empty {
      height: 100%;
      min-height: 400px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--meta);
    }

    /* 覆盖默认 [hidden] 的 display:none 被 display:grid 吃掉的问题 */
    .result-empty[hidden] {
      display: none;
    }

    .result-empty svg {
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      min-height: 400px;
    }

    .result-item {
      position: relative;
      background: var(--bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-item img {
      width: 100%;
      height: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
    }

    /* ── Progress monitor ── */
    .progress-monitor {
      margin-top: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elev, rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
    }
    .progress-monitor[hidden] { display: none; }
    .progress-monitor.error { border-color: #dc2626; }

    .progress-monitor .progress-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .progress-monitor .progress-steps {
      display: flex;
      gap: var(--space-3);
      flex: 1;
      overflow-x: auto;
    }
    .progress-monitor .step {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--meta);
      font-size: var(--text-xs);
      white-space: nowrap;
      transition: color 200ms;
    }
    .progress-monitor .step .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
      transition: background 200ms, box-shadow 200ms;
      flex-shrink: 0;
    }
    .progress-monitor .step.active {
      color: var(--fg);
      font-weight: 500;
    }
    .progress-monitor .step.active .dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.18);
      animation: progress-pulse 1.4s ease-in-out infinite;
    }
    .progress-monitor .step.done { color: var(--fg-2); }
    .progress-monitor .step.done .dot { background: #16a34a; }
    @keyframes progress-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.18); }
      50%      { box-shadow: 0 0 0 7px rgba(201, 100, 66, 0.04); }
    }

    .progress-monitor .elapsed {
      font-variant-numeric: tabular-nums;
      font-size: var(--text-xs);
      color: var(--meta);
      white-space: nowrap;
    }

    .progress-monitor .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-monitor .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), color-mix(in oklab, var(--accent), white 25%));
      width: 0%;
      transition: width 250ms ease;
    }
    .progress-monitor.error .bar-fill { background: #dc2626; }

    .progress-monitor .progress-text {
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--meta);
      font-variant-numeric: tabular-nums;
    }

    .result-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-3);
      background: linear-gradient(to top, rgba(20, 20, 19, 0.7), transparent);
      display: flex;
      gap: var(--space-2);
      opacity: 0;
      transition: opacity var(--motion-fast) var(--ease-standard);
    }

    .result-item:hover .result-actions {
      opacity: 1;
    }

    .result-actions .btn {
      flex: 1;
      font-size: var(--text-sm);
      padding: var(--space-2) var(--space-3);
    }

    .status {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
    }

    .status.info {
      background: var(--surface-warm);
      color: var(--fg-2);
    }

    .status.error {
      background: rgba(181, 51, 51, 0.08);
      color: var(--danger);
    }

    .status[hidden] {
      display: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .quick-prompts {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .quick-prompts-title {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--fg-2);
    }

    .quick-prompts-select {
      width: 100%;
    }

    .footer {
      padding: var(--space-8) 0;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 500;
      color: var(--fg);
    }

    .footer-links {
      display: flex;
      gap: var(--space-5);
    }

    .footer-links a {
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .footer-links a:hover {
      color: var(--fg);
    }

    @media (max-width: 991px) {
      .generator {
        grid-template-columns: 1fr;
      }
      .generator-panel {
        position: static;
      }
      .page-header {
        padding-top: 80px;
      }
    }

    @media (max-width: 768px) {
      .nav-actions .btn:not(.lang-toggle) {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- 预设编辑 modal(增删改查) -->

      <button type="button" class="modal-card-close" aria-label="Close" id="preset-edit-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 id="preset-edit-heading" data-i18n="presetEditTitle">编辑风格预设</h2>
      <p class="modal-subtitle" data-i18n="presetEditSubtitle">增 / 删 / 改 / 查当前所有风格预设</p>

      <div class="modal-toolbar">
        <button type="button" class="btn btn-primary" id="preset-edit-new-btn">
          <span data-i18n="presetEditNew">+ 新建预设</span>
        </button>
        <button type="button" class="btn btn-ghost" id="preset-edit-reset-all-btn" data-i18n="presetEditResetAll">恢复所有内置预设</button>
      </div>

      <div class="preset-edit-list" id="preset-edit-list"></div>

      <div class="preset-edit-editor" id="preset-edit-editor">
        <div>
          <label for="preset-edit-name-input" data-i18n="presetEditNameLabel">预设名称</label>
          <input type="text" id="preset-edit-name-input" maxlength="64" />
        </div>
        <div>
          <label for="preset-edit-prompt" data-i18n="presetEditPromptLabel">提示词</label>
          <textarea id="preset-edit-prompt" rows="4"></textarea>
        </div>
        <div class="editor-actions">
          <button type="button" class="btn btn-ghost" id="preset-edit-cancel-btn" data-i18n="actionCancel">取消</button>
          <button type="button" class="btn btn-primary" id="preset-edit-save-btn" data-i18n="actionSave">保存</button>
        </div>
      </div>
    </div>

  <header class="nav">
    <div class="container nav-inner">
      <a href="landing.html" class="nav-logo"><img src="../assets/presets/logo透明.png" alt="混沌艺术" class="nav-logo-img" style="height:28px;width:auto;display:block;" /></a>
      <nav class="nav-links" aria-label="主导航" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu">
        <a href="generate.html" data-i18n="navGenerate">图片生成</a>
        <a href="copy.html" data-i18n="navCopy">文案生成</a>
        <a href="preset-styles.html" data-i18n="navStyleManage">风格管理</a>
      </nav>
      <div class="nav-actions">
        <button type="button" class="btn btn-ghost lang-toggle" id="lang-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="langSwitch" data-i18n="langEn">EN</button>
        <a href="settings.html" class="btn btn-ghost" data-i18n="navSettings">设置</a>
        <div class="user-menu" id="user-menu"></div>
      </div>
      <button class="btn btn-ghost btn-icon nav-mobile-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu" aria-label="打开菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

  <main class="container">
    <header class="page-header">
      <div class="eyebrow" data-i18n="pageTextToImageTitle">文生图</div>
      <h1 data-i18n="pageTextToImageTitle">文生图</h1>
      <p class="lead" data-i18n="pageTextToImageSubtitle">输入提示词，让 AI 生成画面。</p>
    </header>

    <section class="generator">
      <form class="generator-panel" id="generate-form">
        <div class="provider-indicator" id="provider-indicator" aria-live="polite"></div>
        <div class="field">
          <label for="prompt" data-i18n="labelPrompt">提示词</label>
          <textarea id="prompt" name="prompt" data-i18n-attr="placeholder" data-i18n-placeholder="txtPromptPlaceholder" placeholder="例如：一只橘猫坐在窗台上看夕阳，暖色调，柔和光线"></textarea>
          <div class="quick-prompts" id="quick-prompts">
            <label for="preset-style" class="quick-prompts-title" data-i18n="presetStyleLabel">预设风格</label>
            <div class="quick-prompts-row">
              <select id="preset-style" class="quick-prompts-select" data-i18n-attr="aria-label" data-i18n-aria-label="presetStyleLabel">
                <option value="" selected data-i18n="presetStylePlaceholder">选择风格…</option>
                <option value="ecommerce" data-i18n="quickPromptEcommerce">电商产品主图</option>
                <option value="social" data-i18n="quickPromptSocial">社交媒体海报</option>
                <option value="brand" data-i18n="quickPromptBrand">品牌视觉海报</option>
                <option value="portrait" data-i18n="quickPromptPortrait">人像写真</option>
                <option value="product" data-i18n="quickPromptProduct">产品场景图</option>
                <option value="cinematic" data-i18n="quickPromptCinematic">电影感画面</option>
                <option value="illustration" data-i18n="quickPromptIllustration">插画风格</option>
                <option value="minimal" data-i18n="quickPromptMinimal">极简风格</option>
              </select>
              <button type="button" class="btn btn-ghost btn-icon preset-edit-btn" id="preset-edit-btn" disabled data-i18n="actionEdit" data-i18n-attr="title" data-i18n-title="presetEditHint">编辑</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="size" data-i18n="labelSize">尺寸</label>
          <select id="size" name="size">
            <option value="1024x1024" selected>1024 × 1024</option>
            <option value="1024x1536">1024 × 1536</option>
            <option value="1536x1024">1536 × 1024</option>
            <option value="2048x2048">2048 × 2048</option>
          </select>
        </div>

        <div class="field">
          <span class="field-label" data-i18n="labelOrientation">方向</span>
          <div class="orientation-toggle" role="radiogroup" aria-label="方向" data-i18n-attr="aria-label" data-i18n-aria-label="ariaDirection">
            <label class="orientation-option">
              <input type="radio" name="orientation" value="landscape" checked />
              <span data-i18n="orientationLandscape">横屏</span>
            </label>
            <label class="orientation-option">
              <input type="radio" name="orientation" value="portrait" />
              <span data-i18n="orientationPortrait">竖屏</span>
            </label>
            <label class="orientation-option">
              <input type="radio" name="orientation" value="square" />
              <span data-i18n="orientationSquare">正方形</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="quality" data-i18n="labelQuality">画质</label>
          <select id="quality" name="quality">
            <option value="standard" data-i18n="settingQualityStandard">标准</option>
            <option value="hd" selected data-i18n="settingQualityHd">高清</option>
          </select>
        </div>

        <div class="field">
          <label for="n" data-i18n="labelCount">数量</label>
          <select id="n" name="n">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="4">4</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span data-i18n="actionGenerate">生成</span>
        </button>
      </form>

      <div class="generator-result">
        <div class="status info" id="status-info" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span data-i18n="statusGenerating">正在生成…</span>
        </div>

        <div class="progress-monitor" id="progress-monitor" hidden>
          <div class="progress-header">
            <div class="progress-steps">
              <div class="step" data-step="0"><span class="dot"></span><span data-i18n="progressStepPrepare">准备请求</span></div>
              <div class="step" data-step="1"><span class="dot"></span><span data-i18n="progressStepSubmit">提交上游</span></div>
              <div class="step" data-step="2"><span class="dot"></span><span data-i18n="progressStepWait">生成中</span></div>
              <div class="step" data-step="3"><span class="dot"></span><span data-i18n="progressStepReceive">接收结果</span></div>
            </div>
            <span class="elapsed">0.0s</span>
          </div>
          <div class="progress-bar"><div class="bar-fill"></div></div>
          <div class="progress-text" data-i18n="progressInit">初始化…</div>
        </div>

        <div class="status error" id="status-error" hidden>
          <span data-i18n="statusError">生成失败</span>：<span id="error-message"></span>
        </div>

        <div class="result-empty" id="result-empty">
          <div>
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p data-i18n="emptyResult">生成的图片将显示在这里</p>
          </div>
        </div>

        <div class="result-grid" id="result-grid" hidden></div>
      </div>
    </section>

    <section class="history-section" id="history-section">
      <div class="history-header">
        <h2 data-i18n="historyTitle">生成历史</h2>
        <button type="button" class="btn btn-ghost" id="clear-history-btn" data-i18n="actionClearHistory">清空历史</button>
      </div>
      <div class="history-empty" id="history-empty" data-i18n="historyEmpty">暂无历史记录</div>
      <div class="history-grid" id="history-grid" hidden></div>
    </section>

  <script src="../js/i18n.js"></script>

  <script src="../js/api.js"></script>
  <script>
    (function () {
      const btn = document.getElementById('lang-toggle');
      const titleEl = document.querySelector('title');
      const form = document.getElementById('generate-form');
      const submitBtn = document.getElementById('submit-btn');
      const statusInfo = document.getElementById('status-info');
      const statusError = document.getElementById('status-error');
      const errorMessage = document.getElementById('error-message');
      const resultEmpty = document.getElementById('result-empty');
      const resultGrid = document.getElementById('result-grid');
      const historyGrid = document.getElementById('history-grid');
      const historyEmpty = document.getElementById('history-empty');
      const clearHistoryBtn = document.getElementById('clear-history-btn');
      const presetSelect = document.getElementById('preset-style');
      const progressMonitor = document.getElementById('progress-monitor');
      const HISTORY_TYPE = 'text';

      function updateTitle() {
        const brand = I18N.t('brandName');
        const page = I18N.t('pageTextToImageTitle');
        titleEl.textContent = brand + ' · ' + page;
      }

      function updateToggleLabel() {
        const next = I18N.locale() === 'zh-CN' ? 'en' : 'zh-CN';
        btn.textContent = next === 'zh-CN' ? I18N.t('langZh') : I18N.t('langEn');
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        statusInfo.hidden = !loading;
        statusError.hidden = true;
      }

      function showError(msg) {
        errorMessage.textContent = msg;
        statusError.hidden = false;
        statusInfo.hidden = true;
      }

      function renderResults(data) {
        resultEmpty.hidden = true;
        resultGrid.hidden = false;
        resultGrid.innerHTML = '';

        (data.data || []).forEach(function (item) {
          const url = ChaosAPI.resultToImageUrl(item);
          if (!url) return;

          ChaosAPI.syncSaveHistory(HISTORY_TYPE, url, {
            prompt: form.prompt.value.trim(),
            size: form.size.value,
            quality: form.quality.value,
          });

          const card = ChaosAPI.makeImageCard(url, {
            className: 'result-item',
            loading: 'lazy',
            filename: 'chaosbuilder-text-' + Date.now() + '.png',
          });
          resultGrid.appendChild(card);
        });

        renderHistory();
      }

      function renderHistory() {
        const history = ChaosAPI.getHistory(HISTORY_TYPE);
        historyGrid.innerHTML = '';
        if (!history.length) {
          if (localStorage.getItem('chaos_builder_token') && !window._chaosbuilder_history_pulled) {
            window._chaosbuilder_history_pulled = true;
            ChaosAPI.syncFromServer().then(renderHistory);
          }
                    historyEmpty.hidden = false;
          historyGrid.hidden = true;
          return;
        }
        historyEmpty.hidden = true;
        historyGrid.hidden = false;
        history.forEach(function (entry) {
          const card = ChaosAPI.makeImageCard(entry.url, {
            className: 'history-item',
            loading: 'lazy',
            title: I18N.t('historyItemHint'),
            filename: 'chaosbuilder-text-' + entry.createdAt + '.png',
            onDelete: function () {
              ChaosAPI.deleteHistory(HISTORY_TYPE, entry);
              renderHistory();
            },
          });
          historyGrid.appendChild(card);
        });
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const prompt = form.prompt.value.trim();
        if (!prompt) {
          showError(I18N.t('errorNoPrompt'));
          return;
        }

        const progress = ChaosAPI.createProgressMonitor(progressMonitor);
        setLoading(true);
        progress.reset();
        progress.setStep(0, I18N.t('progressStepPrepare'));
        await new Promise(function (r) { setTimeout(r, 0); });

        try {
          const promise = ChaosAPI.generateImage(prompt, {
            size: form.size.value,
            quality: form.quality.value,
            n: Number(form.n.value),
          });
          progress.setStep(1, I18N.t('progressStepSubmit'));
          await new Promise(function (r) { setTimeout(r, 0); });
          progress.setStep(2, I18N.t('progressStepWait'));
          const data = await promise;
          progress.setStep(3, I18N.t('progressStepReceive'));
          progress.finish(true, I18N.t('progressDone'));
          renderResults(data);
        } catch (err) {
          progress.finish(false, err.title || err.message || I18N.t('progressFailed'));
          showError(err.title || err.message || I18N.t('statusError'));
          ChaosAPI.showErrorModal(err);
        } finally {
          setLoading(false);
        }
      });

      clearHistoryBtn.addEventListener('click', function () {
        ChaosAPI.clearHistory(HISTORY_TYPE);
        renderHistory();
      });

      btn.addEventListener('click', function () {
        I18N.toggle();
      });

      document.addEventListener('i18n:changed', function () {
        updateTitle();
        updateToggleLabel();
      });

      const PRESETS = {
        ecommerce: 'E-commerce product photo on clean white background, centered composition, soft shadows, professional studio lighting, high detail',
        social: 'Eye-catching social media post, vibrant colors, bold composition, modern graphic design style, high contrast, square format',
        brand: 'Brand poster design, large elegant typography, generous whitespace, premium editorial layout, warm terracotta accent on cream background',
        portrait: 'Natural light portrait photography, soft skin tones, shallow depth of field, editorial magazine quality, warm golden hour light',
        product: 'Lifestyle product photography, product in real usage scene, cozy domestic environment, natural lighting, authentic composition',
        cinematic: 'Cinematic wide shot, dramatic lighting, film grain, atmospheric depth, storytelling composition, dusk or golden hour',
        illustration: 'Hand-drawn illustration style, vivid colors, friendly characters, textured brush strokes, suitable for editorial content',
        minimal: 'Minimalist composition, geometric shapes, muted palette, generous negative space, premium and clean aesthetic',
      };

      // 读取 localStorage 中用户改过的 preset 覆盖
      const PRESET_OVERRIDES_KEY = 'chaos_builder_preset_overrides';
      function loadPresetOverrides() {
        try {
          const raw = localStorage.getItem(PRESET_OVERRIDES_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (_) { return {}; }
      }
      function savePresetOverrides(o) {
        try { localStorage.setItem(PRESET_OVERRIDES_KEY, JSON.stringify(o)); } catch (_) {}
      }
      function getPresetPrompt(key) {
        if (!key) return '';
        const overrides = loadPresetOverrides();
        return (overrides[key] !== undefined ? overrides[key] : PRESETS[key]) || '';
      }

      function applyPreset() {
        const params = new URLSearchParams(location.search);
        const key = params.get('preset');
        const prompt = params.get('prompt');
        if (prompt) {
          form.prompt.value = decodeURIComponent(prompt);
        } else if (key && PRESETS[key]) {
          form.prompt.value = getPresetPrompt(key);
          presetSelect.value = key;
        }
      }

      presetSelect.addEventListener('change', function () {
        const key = presetSelect.value;
        if (key && PRESETS[key]) {
          form.prompt.value = getPresetPrompt(key);
        }
        // 有选中才能编辑
        const editBtn = document.getElementById('preset-edit-btn');
        if (editBtn) editBtn.disabled = !key;
      });

      // 风格预设编辑 modal: 增 / 删 / 改 / 查
      // 内置 8 个:可改 prompt(key/name 不可改,不可删)
      // 用户自定义:存在 localStorage['chaos_builder_user_presets'],key/name/prompt 均可改
      // 内置覆盖:localStorage['chaos_builder_preset_overrides'] (沿用旧 key)
      (function setupPresetEditModal() {
        const editBtn = document.getElementById('preset-edit-btn');
        const overlay = document.getElementById('preset-edit-modal');
        if (!editBtn || !overlay) return;

        const listEl = document.getElementById('preset-edit-list');
        const editorEl = document.getElementById('preset-edit-editor');
        const nameInput = document.getElementById('preset-edit-name-input');
        const promptInput = document.getElementById('preset-edit-prompt');
        const closeBtn = document.getElementById('preset-edit-close-btn');
        const cancelBtn = document.getElementById('preset-edit-cancel-btn');
        const saveBtn = document.getElementById('preset-edit-save-btn');
        const newBtn = document.getElementById('preset-edit-new-btn');
        const resetAllBtn = document.getElementById('preset-edit-reset-all-btn');

        const USER_PRESETS_KEY = 'chaos_builder_user_presets';

        let editingKey = null;
        let editingIsNew = false;

        function loadUserPresets() {
          try {
            const raw = localStorage.getItem(USER_PRESETS_KEY);
            if (!raw) return {};
            const obj = JSON.parse(raw);
            return (obj && typeof obj === 'object') ? obj : {};
          } catch (e) { return {}; }
        }
        function saveUserPresets(map) {
          try { localStorage.setItem(USER_PRESETS_KEY, JSON.stringify(map)); } catch (e) {}
        }
        function getBuiltinDisplayName(key) {
          const names = {
            ecommerce: I18N.t('quickPromptEcommerce'),
            social: I18N.t('quickPromptSocial'),
            brand: I18N.t('quickPromptBrand'),
            portrait: I18N.t('quickPromptPortrait'),
            product: I18N.t('quickPromptProduct'),
            cinematic: I18N.t('quickPromptCinematic'),
            illustration: I18N.t('quickPromptIllustration'),
            minimal: I18N.t('quickPromptMinimal'),
          };
          return names[key] || key;
        }
        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        }
        function truncate(s, n) {
          s = String(s || '');
          return s.length > n ? s.slice(0, n) + '…' : s;
        }

        function renderList() {
          if (!listEl) return;
          const userPresets = loadUserPresets();
          const builtinKeys = Object.keys(PRESETS || {});
          let html = '';
          html += '<div class="preset-edit-list-empty" style="padding:6px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">' +
            escapeHtml(I18N.t('presetEditBuiltinSection', '内置')) + '</div>';
          builtinKeys.forEach(function (key) {
            const name = getBuiltinDisplayName(key);
            const prompt = getPresetPrompt(key);
            const isSelected = (editingKey === 'builtin:' + key) ? ' selected' : '';
            html +=
              '<div class="preset-edit-list-item' + isSelected + '" data-key="builtin:' + escapeHtml(key) + '">' +
                '<span class="pi-name">' + escapeHtml(name) + '</span>' +
                '<span class="pi-tag">' + escapeHtml(I18N.t('presetEditBuiltinTag', '内置')) + '</span>' +
                '<span style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(truncate(prompt, 40)) + '</span>' +
                '<button type="button" class="pi-action" data-action="edit" title="' + escapeHtml(I18N.t('actionEdit', '编辑')) + '">' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                '</button>' +
              '</div>';
          });
          const userKeys = Object.keys(userPresets);
          html += '<div class="preset-edit-list-empty" style="padding:12px 16px 6px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">' +
            escapeHtml(I18N.t('presetEditUserSection', '自定义')) + ' (' + userKeys.length + ')</div>';
          if (userKeys.length === 0) {
            html += '<div class="preset-edit-list-empty">' + escapeHtml(I18N.t('presetEditUserEmpty', '暂无自定义预设,点上方 + 新建预设')) + '</div>';
          } else {
            userKeys.forEach(function (key) {
              const entry = userPresets[key] || {};
              const name = entry.name || key;
              const prompt = entry.prompt || '';
              const isSelected = (editingKey === 'user:' + key) ? ' selected' : '';
              html +=
                '<div class="preset-edit-list-item' + isSelected + '" data-key="user:' + escapeHtml(key) + '">' +
                  '<span class="pi-name">' + escapeHtml(name) + '</span>' +
                  '<span class="pi-tag custom">' + escapeHtml(I18N.t('presetEditCustomTag', '自定义')) + '</span>' +
                  '<span style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(truncate(prompt, 40)) + '</span>' +
                  '<button type="button" class="pi-action" data-action="edit" title="' + escapeHtml(I18N.t('actionEdit', '编辑')) + '">' +
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                  '</button>' +
                  '<button type="button" class="pi-action danger" data-action="delete" title="' + escapeHtml(I18N.t('actionDelete', '删除')) + '">' +
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>' +
                  '</button>' +
                '</div>';
            });
          }
          listEl.innerHTML = html;
        }

        function selectItem(combinedKey) {
          editingKey = combinedKey;
          editingIsNew = false;
          const sep = combinedKey.indexOf(':');
          const type = combinedKey.slice(0, sep);
          const key = combinedKey.slice(sep + 1);
          if (type === 'builtin') {
            if (nameInput) {
              nameInput.value = getBuiltinDisplayName(key);
              nameInput.disabled = true;
            }
            if (promptInput) promptInput.value = getPresetPrompt(key);
          } else {
            const userPresets = loadUserPresets();
            const entry = userPresets[key] || {};
            if (nameInput) {
              nameInput.value = entry.name || key;
              nameInput.disabled = false;
            }
            if (promptInput) promptInput.value = entry.prompt || '';
          }
          if (editorEl) editorEl.classList.add('active');
          renderList();
        }

        function deselectItem() {
          editingKey = null;
          editingIsNew = false;
          if (editorEl) editorEl.classList.remove('active');
          renderList();
        }

        function open() {
          overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
          if (window.I18N) window.I18N.apply();
          deselectItem();
        }
        function close() {
          overlay.classList.remove('active');
          document.body.style.overflow = '';
          deselectItem();
        }

        editBtn.addEventListener('click', open);
        if (closeBtn) closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && overlay.classList.contains('active')) close();
        });

        if (listEl) {
          listEl.addEventListener('click', function (e) {
            const btn = e.target.closest('button[data-action]');
            const item = e.target.closest('.preset-edit-list-item');
            if (!item) return;
            const combinedKey = item.getAttribute('data-key');
            if (btn) {
              const action = btn.getAttribute('data-action');
              if (action === 'edit') {
                selectItem(combinedKey);
              } else if (action === 'delete') {
                const sep = combinedKey.indexOf(':');
                if (combinedKey.slice(0, sep) !== 'user') return;
                const key = combinedKey.slice(sep + 1);
                if (!confirm(I18N.t('presetEditDeleteConfirm', '确定要删除这个自定义预设吗?'))) return;
                const userPresets = loadUserPresets();
                delete userPresets[key];
                saveUserPresets(userPresets);
                if (editingKey === combinedKey) deselectItem();
                else renderList();
                showSaveToast(I18N.t('presetEditDeleted', '已删除'));
              }
            } else {
              selectItem(combinedKey);
            }
          });
        }

        if (newBtn) newBtn.addEventListener('click', function () {
          editingKey = 'user:new';
          editingIsNew = true;
          if (nameInput) { nameInput.value = ''; nameInput.disabled = false; nameInput.placeholder = I18N.t('presetEditNamePlaceholder', '例:我的梦幻风格'); }
          if (promptInput) { promptInput.value = ''; promptInput.placeholder = I18N.t('presetEditPromptPlaceholder', '用英文描述画面风格,逗号分隔关键词'); }
          if (editorEl) editorEl.classList.add('active');
          renderList();
          setTimeout(function () { if (nameInput) nameInput.focus(); }, 50);
        });

        if (cancelBtn) cancelBtn.addEventListener('click', function () { deselectItem(); });

        if (saveBtn) saveBtn.addEventListener('click', function () {
          if (!editingKey) return;
          const newName = nameInput ? nameInput.value.trim() : '';
          const newPrompt = promptInput ? promptInput.value.trim() : '';
          if (!newPrompt) {
            alert(I18N.t('presetEditEmpty', '提示词不能为空'));
            return;
          }
          const sep = editingKey.indexOf(':');
          const type = editingKey.slice(0, sep);
          const key = editingKey.slice(sep + 1);

          if (type === 'builtin') {
            const overrides = loadPresetOverrides();
            overrides[key] = newPrompt;
            savePresetOverrides(overrides);
            if (presetSelect && presetSelect.value === key) form.prompt.value = newPrompt;
            showSaveToast(I18N.t('presetEditSaved', '已保存'));
            close();
          } else {
            const userPresets = loadUserPresets();
            if (editingIsNew) {
              let newKey = (newName || 'preset').toLowerCase().replace(/[^a-z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '').slice(0, 32) || 'preset_' + Date.now();
              while (userPresets[newKey]) newKey = newKey + '_' + Math.floor(Math.random() * 1000);
              userPresets[newKey] = { name: newName || newKey, prompt: newPrompt };
              if (presetSelect) {
                let opt = presetSelect.querySelector('option[value="' + newKey + '"]');
                if (!opt) {
                  opt = document.createElement('option');
                  opt.value = newKey;
                  opt.textContent = newName || newKey;
                  presetSelect.appendChild(opt);
                }
              }
            } else {
              userPresets[key] = { name: newName || key, prompt: newPrompt };
              if (presetSelect) {
                const opt = presetSelect.querySelector('option[value="' + key + '"]');
                if (opt) opt.textContent = newName || key;
              }
            }
            saveUserPresets(userPresets);
            showSaveToast(I18N.t('presetEditSaved', '已保存'));
            close();
          }
        });

        if (resetAllBtn) resetAllBtn.addEventListener('click', function () {
          if (!confirm(I18N.t('presetEditResetAllConfirm', '确定要恢复所有内置预设的提示词吗?(会清除你对内置预设的所有修改)'))) return;
          try { localStorage.removeItem('chaos_builder_preset_overrides'); } catch (e) {}
          showSaveToast(I18N.t('presetEditResetAllDone', '已恢复'));
          renderList();
        });

        function showSaveToast(msg) {
          let t = document.getElementById('preset-edit-toast');
          if (!t) {
            t = document.createElement('div');
            t.id = 'preset-edit-toast';
            t.className = 'preset-edit-toast';
            document.body.appendChild(t);
          }
          t.textContent = msg;
          t.classList.add('show');
          clearTimeout(t._timer);
          t._timer = setTimeout(function () { t.classList.remove('show'); }, 1800);
        }

        window.refreshPresetEditList = renderList;
      })();

      // Orientation 驱动 size select:列表动态筛选 + 默认值自动选第一个
      function applySizeFilter(orientation) {
        if (!form.size) return;
        var sizes = ChaosAPI.getSizesByOrientation(orientation);
        form.size.innerHTML = '';
        sizes.forEach(function (opt) {
          var option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          form.size.appendChild(option);
        });
        if (sizes.length) form.size.value = sizes[0].value;
      }

      // 页面加载:按默认勾选的方向预过滤 size select
      var initialOrientation = (document.querySelector('input[name="orientation"]:checked') || {}).value;
      if (initialOrientation) applySizeFilter(initialOrientation);

      // radio 变化:重新过滤
      document.querySelectorAll('input[name="orientation"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
          if (!radio.checked) return;
          applySizeFilter(radio.value);
        });
      });

      Auth.requireAuth();
      Auth.renderUserMenu('#user-menu');
      applyPreset();
      renderHistory();

      // 实时显示当前供应商 + 模型(settings 页面切换后会同步更新)
      (function syncProviderIndicator() {
        var indicator = document.getElementById('provider-indicator');
        if (!indicator || !ChaosAPI.getCurrentProviderInfo) return;
        function paint() {
          var info = ChaosAPI.getCurrentProviderInfo();
          indicator.textContent = (info.label || info.key) + ' · ' + (info.model || '');
        }
        paint();
        ChaosAPI.onConfigChange(paint);
      })();

      updateTitle();
      updateToggleLabel();
      if (window.I18N) I18N.apply();
    })();
  </script>

</body>
</html>
