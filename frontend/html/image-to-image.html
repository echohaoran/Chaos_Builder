<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../assets/presets/logo透明.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>混沌艺术 · 图生图</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <style>
    .lang-toggle {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 200;
    }

    .page-header {
      padding-top: 120px;
      padding-bottom: var(--space-8);
      text-align: center;
    }

    .page-header h1 {
      margin-bottom: var(--space-4);
    }

    .page-header .lead {
      margin: 0 auto;
    }

    .generator {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: var(--space-8);
      align-items: stretch;
      margin-bottom: var(--section-y-desktop);
    }

    .generator-panel,
    .generator-result {
      height: 100%;
    }

    .generator-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--elev-raised);
      position: sticky;
      top: 88px;
      display: flex;
      flex-direction: column;
    }

    .generator-panel .field + .field {
      margin-top: var(--space-5);
    }

    .generator-panel .btn-primary {
      width: 100%;
      margin-top: var(--space-6);
    }

    .upload-zone {
      border: 2px dashed var(--border-soft);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--motion-fast) var(--ease-standard),
                  background var(--motion-fast) var(--ease-standard);
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(201, 100, 66, 0.04);
    }

    .upload-zone input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .upload-zone svg {
      color: var(--accent);
      margin-bottom: var(--space-3);
    }

    .upload-zone .label {
      font-weight: 500;
      color: var(--fg-2);
      display: block;
      margin-bottom: var(--space-1);
    }

    .upload-zone .hint {
      font-size: var(--text-sm);
      color: var(--meta);
    }

    .preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .preview-item {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item button {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 0;
      background: var(--fg);
      color: var(--surface);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .generator-result {
      min-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--elev-raised);
    }

    .result-empty {
      height: 100%;
      min-height: 400px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--meta);
    }

    /* 覆盖默认 [hidden] 的 display:none 被 display:grid 吃掉的问题 */
    .result-empty[hidden] {
      display: none;
    }

    .result-empty svg {
      margin-bottom: var(--space-4);
      opacity: 0.4;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
      min-height: 400px;
    }

    .result-item {
      position: relative;
      background: var(--bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-item img {
      width: 100%;
      height: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
    }

    /* ── Progress monitor ── */
    .progress-monitor {
      margin-top: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-elev, rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
    }
    .progress-monitor[hidden] { display: none; }
    .progress-monitor.error { border-color: #dc2626; }

    .progress-monitor .progress-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .progress-monitor .progress-steps {
      display: flex;
      gap: var(--space-3);
      flex: 1;
      overflow-x: auto;
    }
    .progress-monitor .step {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--meta);
      font-size: var(--text-xs);
      white-space: nowrap;
      transition: color 200ms;
    }
    .progress-monitor .step .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
      transition: background 200ms, box-shadow 200ms;
      flex-shrink: 0;
    }
    .progress-monitor .step.active {
      color: var(--fg);
      font-weight: 500;
    }
    .progress-monitor .step.active .dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.18);
      animation: progress-pulse 1.4s ease-in-out infinite;
    }
    .progress-monitor .step.done { color: var(--fg-2); }
    .progress-monitor .step.done .dot { background: #16a34a; }
    @keyframes progress-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(201, 100, 66, 0.18); }
      50%      { box-shadow: 0 0 0 7px rgba(201, 100, 66, 0.04); }
    }

    .progress-monitor .elapsed {
      font-variant-numeric: tabular-nums;
      font-size: var(--text-xs);
      color: var(--meta);
      white-space: nowrap;
    }

    .progress-monitor .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-monitor .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), color-mix(in oklab, var(--accent), white 25%));
      width: 0%;
      transition: width 250ms ease;
    }
    .progress-monitor.error .bar-fill { background: #dc2626; }

    .progress-monitor .progress-text {
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--meta);
      font-variant-numeric: tabular-nums;
    }

    .result-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-3);
      background: linear-gradient(to top, rgba(20, 20, 19, 0.7), transparent);
      display: flex;
      gap: var(--space-2);
      opacity: 0;
      transition: opacity var(--motion-fast) var(--ease-standard);
    }

    .result-item:hover .result-actions {
      opacity: 1;
    }

    .result-actions .btn {
      flex: 1;
      font-size: var(--text-sm);
      padding: var(--space-2) var(--space-3);
    }

    .status {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
    }

    .status.info {
      background: var(--surface-warm);
      color: var(--fg-2);
    }

    .status.error {
      background: rgba(181, 51, 51, 0.08);
      color: var(--danger);
    }

    .status[hidden] {
      display: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      padding: var(--space-8) 0;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 500;
      color: var(--fg);
    }

    .footer-links {
      display: flex;
      gap: var(--space-5);
    }

    .footer-links a {
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .footer-links a:hover {
      color: var(--fg);
    }

    @media (max-width: 991px) {
      .generator {
        grid-template-columns: 1fr;
      }
      .generator-panel {
        position: static;
      }
      .page-header {
        padding-top: 80px;
      }
    }

    @media (max-width: 768px) {
      .nav-actions .btn:not(.lang-toggle) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="landing.html" class="nav-logo" data-i18n="brandName">混沌艺术</a>
      <nav class="nav-links" aria-label="主导航" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu">
        <a href="generate.html" data-i18n="navGenerate">图片生成</a>
        <a href="copy.html" data-i18n="navCopy">文案生成</a>
        <a href="preset-styles.html" data-i18n="navStyleManage">风格管理</a>
      </nav>
      <div class="nav-actions">
        <button type="button" class="btn btn-ghost lang-toggle" id="lang-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="langSwitch" data-i18n="langEn">EN</button>
        <a href="settings.html" class="btn btn-ghost" data-i18n="navSettings">设置</a>
        <div class="user-menu" id="user-menu"></div>
      </div>
      <button class="btn btn-ghost btn-icon nav-mobile-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu" aria-label="打开菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <header class="page-header">
      <div class="eyebrow" data-i18n="pageImageToImageTitle">图生图</div>
      <h1 data-i18n="pageImageToImageTitle">图生图</h1>
      <p class="lead" data-i18n="pageImageToImageSubtitle">上传参考图，重构风格与场景。</p>
    </header>

    <section class="generator">
      <form class="generator-panel" id="generate-form">
        <div class="provider-indicator" id="provider-indicator" aria-live="polite"></div>
        <div class="field">
          <label data-i18n="labelUploadImage">上传参考图</label>
          <div class="upload-zone" id="upload-zone" role="button" tabindex="0">
            <input type="file" id="image" name="image" accept="image/*" />
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span class="label" data-i18n="actionUpload">上传图片</span>
            <span class="hint" data-i18n="hintDragDrop">支持拖拽上传</span>
          </div>
          <div class="preview-list" id="preview-list"></div>
        </div>

        <div class="field">
          <label for="prompt" data-i18n="labelPrompt">提示词</label>
          <textarea id="prompt" name="prompt" data-i18n-attr="placeholder" data-i18n-placeholder="imgPromptPlaceholder" placeholder="描述你想在参考图基础上如何改变，例如：把背景换成星空"></textarea>
        </div>

        <div class="field">
          <label for="size" data-i18n="labelSize">尺寸</label>
          <select id="size" name="size">
            <option value="1024x1024" selected>1024 × 1024</option>
            <option value="1024x1536">1024 × 1536</option>
            <option value="1536x1024">1536 × 1024</option>
            <option value="2048x2048">2048 × 2048</option>
          </select>
        </div>

        <div class="field">
          <span class="field-label" data-i18n="labelOrientation">方向</span>
          <div class="orientation-toggle" role="radiogroup" aria-label="方向">
            <label class="orientation-option">
              <input type="radio" name="orientation" value="landscape" checked />
              <span data-i18n="orientationLandscape">横屏</span>
            </label>
            <label class="orientation-option">
              <input type="radio" name="orientation" value="portrait" />
              <span data-i18n="orientationPortrait">竖屏</span>
            </label>
            <label class="orientation-option">
              <input type="radio" name="orientation" value="square" />
              <span data-i18n="orientationSquare">正方形</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="quality" data-i18n="labelQuality">画质</label>
          <select id="quality" name="quality">
            <option value="standard" data-i18n="settingQualityStandard">标准</option>
            <option value="hd" selected data-i18n="settingQualityHd">高清</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span data-i18n="actionGenerate">生成</span>
        </button>
      </form>

      <div class="generator-result">
        <div class="status info" id="status-info" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span data-i18n="statusGenerating">正在生成…</span>
        </div>

        <div class="progress-monitor" id="progress-monitor" hidden>
          <div class="progress-header">
            <div class="progress-steps">
              <div class="step" data-step="0"><span class="dot"></span><span data-i18n="progressStepPrepare">准备请求</span></div>
              <div class="step" data-step="1"><span class="dot"></span><span data-i18n="progressStepSubmit">提交上游</span></div>
              <div class="step" data-step="2"><span class="dot"></span><span data-i18n="progressStepWait">生成中</span></div>
              <div class="step" data-step="3"><span class="dot"></span><span data-i18n="progressStepReceive">接收结果</span></div>
            </div>
            <span class="elapsed">0.0s</span>
          </div>
          <div class="progress-bar"><div class="bar-fill"></div></div>
          <div class="progress-text" data-i18n="progressInit">初始化…</div>
        </div>

        <div class="status error" id="status-error" hidden>
          <span data-i18n="statusError">生成失败</span>：<span id="error-message"></span>
        </div>

        <div class="result-empty" id="result-empty">
          <div>
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p data-i18n="emptyResult">生成的图片将显示在这里</p>
          </div>
        </div>

        <div class="result-grid" id="result-grid" hidden></div>
      </div>
    </section>

    <section class="history-section" id="history-section">
      <div class="history-header">
        <h2 data-i18n="historyTitle">生成历史</h2>
        <button type="button" class="btn btn-ghost" id="clear-history-btn" data-i18n="actionClearHistory">清空历史</button>
      </div>
      <div class="history-empty" id="history-empty" data-i18n="historyEmpty">暂无历史记录</div>
      <div class="history-grid" id="history-grid" hidden></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-logo" data-i18n="brandName">混沌艺术</div>
      <nav class="footer-links">
        <a href="landing.html" data-i18n="navHome">首页</a>
        <a href="generate.html" data-i18n="navGenerate">图片生成</a>
        <a href="copy.html" data-i18n="navCopy">文案生成</a>
        <a href="preset-styles.html" data-i18n="navStyleManage">风格管理</a>
        <a href="settings.html" data-i18n="navSettings">设置</a>
      </nav>
      <span class="body-sm brand-copyright" data-i18n="brandCopyright">Developed By ECHOHAORAN</span>
    </div>
  </footer>

  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    (function () {
      const btn = document.getElementById('lang-toggle');
      const titleEl = document.querySelector('title');
      const form = document.getElementById('generate-form');
      const uploadZone = document.getElementById('upload-zone');
      const fileInput = document.getElementById('image');
      const previewList = document.getElementById('preview-list');
      const submitBtn = document.getElementById('submit-btn');
      const statusInfo = document.getElementById('status-info');
      const statusError = document.getElementById('status-error');
      const errorMessage = document.getElementById('error-message');
      const resultEmpty = document.getElementById('result-empty');
      const resultGrid = document.getElementById('result-grid');
      const historyGrid = document.getElementById('history-grid');
      const historyEmpty = document.getElementById('history-empty');
      const clearHistoryBtn = document.getElementById('clear-history-btn');
      const progressMonitor = document.getElementById('progress-monitor');
      const HISTORY_TYPE = 'image';

      let currentFile = null;

      function updateTitle() {
        const brand = I18N.t('brandName');
        const page = I18N.t('pageImageToImageTitle');
        titleEl.textContent = brand + ' · ' + page;
      }

      function updateToggleLabel() {
        const next = I18N.locale() === 'zh-CN' ? 'en' : 'zh-CN';
        btn.textContent = next === 'zh-CN' ? I18N.t('langZh') : I18N.t('langEn');
      }

      function renderPreview(file) {
        currentFile = file;
        const url = URL.createObjectURL(file);
        previewList.innerHTML = '<div class="preview-item">' +
          '<img src="' + url + '" alt="" />' +
          '<button type="button" aria-label="remove">×</button>' +
        '</div>';
        previewList.querySelector('button').addEventListener('click', function () {
          currentFile = null;
          previewList.innerHTML = '';
          fileInput.value = '';
        });
      }

      function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        renderPreview(file);
      }

      function openFilePicker() {
        fileInput.click();
      }
      uploadZone.addEventListener('click', openFilePicker);
      uploadZone.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openFilePicker();
        }
      });

      uploadZone.addEventListener('dragover', function (e) {
        e.preventDefault();
        uploadZone.classList.add('dragover');
      });

      uploadZone.addEventListener('dragleave', function () {
        uploadZone.classList.remove('dragover');
      });

      uploadZone.addEventListener('drop', function (e) {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });

      fileInput.addEventListener('change', function () {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
      });

      function setLoading(loading) {
        submitBtn.disabled = loading;
        statusInfo.hidden = !loading;
        statusError.hidden = true;
      }

      function showError(msg) {
        errorMessage.textContent = msg;
        statusError.hidden = false;
        statusInfo.hidden = true;
      }

      function renderResults(data) {
        resultEmpty.hidden = true;
        resultGrid.hidden = false;
        resultGrid.innerHTML = '';

        (data.data || []).forEach(function (item) {
          const url = ChaosAPI.resultToImageUrl(item);
          if (!url) return;

          ChaosAPI.syncSaveHistory(HISTORY_TYPE, url, {
            prompt: form.prompt.value.trim(),
            size: form.size.value,
            quality: form.quality.value,
          });

          const card = ChaosAPI.makeImageCard(url, {
            className: 'result-item',
            loading: 'lazy',
            filename: 'chaosbuilder-image-' + Date.now() + '.png',
          });
          resultGrid.appendChild(card);
        });

        renderHistory();
      }

      function renderHistory() {
        const history = ChaosAPI.getHistory(HISTORY_TYPE);
        historyGrid.innerHTML = '';
        if (!history.length) {
          if (localStorage.getItem('chaos_builder_token') && !window._chaosbuilder_history_pulled) {
            window._chaosbuilder_history_pulled = true;
            ChaosAPI.syncFromServer().then(renderHistory);
          }
                    historyEmpty.hidden = false;
          historyGrid.hidden = true;
          return;
        }
        historyEmpty.hidden = true;
        historyGrid.hidden = false;
        history.forEach(function (entry) {
          const card = ChaosAPI.makeImageCard(entry.url, {
            className: 'history-item',
            loading: 'lazy',
            title: I18N.t('historyItemHint'),
            filename: 'chaosbuilder-image-' + entry.createdAt + '.png',
            onDelete: function () {
              ChaosAPI.deleteHistory(HISTORY_TYPE, entry);
              renderHistory();
            },
          });
          historyGrid.appendChild(card);
        });
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const prompt = form.prompt.value.trim();
        if (!prompt) {
          showError(I18N.t('errorNoPrompt'));
          return;
        }
        if (!currentFile) {
          showError(I18N.t('errorNoImage'));
          return;
        }

        const progress = ChaosAPI.createProgressMonitor(progressMonitor);
        setLoading(true);
        progress.reset();
        progress.setStep(0, I18N.t('progressStepPrepare'));
        await new Promise(function (r) { setTimeout(r, 0); });

        try {
          const promise = ChaosAPI.editImage(currentFile, prompt, {
            size: form.size.value,
            quality: form.quality.value,
          });
          progress.setStep(1, I18N.t('progressStepSubmit'));
          await new Promise(function (r) { setTimeout(r, 0); });
          progress.setStep(2, I18N.t('progressStepWait'));
          const data = await promise;
          progress.setStep(3, I18N.t('progressStepReceive'));
          progress.finish(true, I18N.t('progressDone'));
          renderResults(data);
        } catch (err) {
          progress.finish(false, err.title || err.message || I18N.t('progressFailed'));
          showError(err.title || err.message || I18N.t('statusError'));
          ChaosAPI.showErrorModal(err);
        } finally {
          setLoading(false);
        }
      });

      clearHistoryBtn.addEventListener('click', function () {
        ChaosAPI.clearHistory(HISTORY_TYPE);
        renderHistory();
      });

      btn.addEventListener('click', function () {
        I18N.toggle();
      });

      document.addEventListener('i18n:changed', function () {
        updateTitle();
        updateToggleLabel();
      });

      // Orientation 驱动 size select:列表动态筛选 + 默认值自动选第一个
      function applySizeFilter(orientation) {
        if (!form.size) return;
        var sizes = ChaosAPI.getSizesByOrientation(orientation);
        form.size.innerHTML = '';
        sizes.forEach(function (opt) {
          var option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          form.size.appendChild(option);
        });
        if (sizes.length) form.size.value = sizes[0].value;
      }

      // 页面加载:按默认勾选的方向预过滤 size select
      var initialOrientation = (document.querySelector('input[name="orientation"]:checked') || {}).value;
      if (initialOrientation) applySizeFilter(initialOrientation);

      // radio 变化:重新过滤
      document.querySelectorAll('input[name="orientation"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
          if (!radio.checked) return;
          applySizeFilter(radio.value);
        });
      });

      Auth.requireAuth();
      Auth.renderUserMenu('#user-menu');
      renderHistory();

      // 实时显示当前供应商 + 模型(settings 页面切换后会同步更新)
      (function syncProviderIndicator() {
        var indicator = document.getElementById('provider-indicator');
        if (!indicator || !ChaosAPI.getCurrentProviderInfo) return;
        function paint() {
          var info = ChaosAPI.getCurrentProviderInfo();
          indicator.textContent = (info.label || info.key) + ' · ' + (info.model || '');
        }
        paint();
        ChaosAPI.onConfigChange(paint);
      })();

      updateTitle();
      updateToggleLabel();
      if (window.I18N) I18N.apply();
    })();
  </script>
</body>
</html>
