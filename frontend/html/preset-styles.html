<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="../assets/presets/logo透明.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>混沌艺术 · 预设风格</title>
  <link rel="stylesheet" href="../css/design-system.css" />
  <style>
    .update-badge { position:absolute;top:-4px;right:-4px;width:8px;height:8px;background:#e53e3e;border-radius:50%;display:none; }
    .nav-link-wrap { position:relative;display:inline-block; }
    .page-header { padding-top:120px; padding-bottom:var(--space-6); text-align:center; }
    .page-header h1 { margin-bottom:var(--space-4); }
    .page-header .lead { margin:0 auto; }
    .mode-tabs { display:flex; gap:var(--space-1); justify-content:center; margin-bottom:var(--space-8); background:var(--bg); border-radius:var(--border-radius-lg); padding:var(--space-1); border:1px solid var(--border); max-width:400px; margin-left:auto; margin-right:auto; }
    .mode-tab { flex:1; padding:var(--space-2) var(--space-4); border:none; background:transparent; color:var(--muted); font-size:var(--text-sm); font-weight:500; cursor:pointer; border-radius:var(--border-radius); transition:all 0.15s; text-align:center; }
    .mode-tab:hover { color:var(--text); }
    .mode-tab.active { background:var(--surface); color:var(--accent); box-shadow:var(--elev-low); }
    .preset-section { display:none; }
    .preset-section.active { display:block; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-6); }
    .section-header h2 { margin:0; }
    .preset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:var(--space-4); margin-bottom:var(--section-y-desktop); }
    .preset-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--border-radius-lg); padding:var(--space-4); transition:box-shadow 0.2s, transform 0.2s; position:relative; overflow:hidden; display:flex; gap:var(--space-3); }
    .preset-card:hover { box-shadow:var(--elev-raised); transform:translateX(-8px); }
    .preset-card .card-content { flex:1; min-width:0; }
    .preset-card .card-preview { flex-shrink:0; width:0; overflow:hidden; transition:width 0.3s ease; border-radius:var(--border-radius); }
    .preset-card:hover .card-preview { width:100px; }
    .preset-card .card-preview img { width:100px; height:100px; object-fit:cover; border-radius:var(--border-radius); }
    .preset-card .card-name { font-weight:600; margin-bottom:var(--space-1); }
    .preset-card .card-meta { font-size:var(--text-xs); color:var(--muted); margin-bottom:var(--space-2); }
    .preset-card .card-prompt { font-size:var(--text-xs); color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:var(--space-3); line-height:1.5; }
    .preset-card .card-actions { display:flex; gap:var(--space-2); padding-top:var(--space-3); border-top:1px solid var(--border); }
    .preset-card .card-actions .btn { flex:1; font-size:var(--text-sm); }
    .copy-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:var(--space-4); margin-bottom:var(--section-y-desktop); }
    .copy-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--border-radius-lg); padding:var(--space-4); display:flex; flex-direction:column; }
    .copy-card .card-name { font-weight:600; margin-bottom:var(--space-1); }
    .copy-card .card-prompt { font-size:var(--text-xs); color:var(--text); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; line-height:1.5; flex:1; margin-bottom:var(--space-3); }
    .copy-card .card-actions { display:flex; gap:var(--space-2); padding-top:var(--space-3); border-top:1px solid var(--border); }
    .copy-card .card-actions .btn { flex:1; font-size:var(--text-sm); }
    .edit-area { display:none; margin-bottom:var(--space-6); padding:var(--space-5); border:1px solid var(--accent); border-radius:var(--border-radius-lg); background:color-mix(in srgb,var(--accent) 4%,transparent); }
    .edit-area.open { display:block; }
    .edit-area .field { margin-bottom:var(--space-4); }
    .edit-area label { display:block; font-size:var(--text-sm); font-weight:500; margin-bottom:var(--space-1); }
    .edit-area input,.edit-area textarea,.edit-area select { width:100%; padding:var(--space-2) var(--space-3); border:1px solid var(--border); border-radius:var(--border-radius); font-size:var(--text-sm); background:var(--bg); color:var(--text); font-family:inherit; }
    .edit-area textarea { resize:vertical; min-height:60px; }
    .edit-area .edit-actions { display:flex; gap:var(--space-3); justify-content:flex-end; margin-top:var(--space-4); }
    .footer { padding:var(--section-y-desktop) 0 var(--space-8); border-top:1px solid var(--border); }
    .footer-inner { display:flex; justify-content:space-between; align-items:center; }
    .footer-logo { font-family:var(--font-display,serif); font-size:var(--text-xl); }
    .footer-links { display:flex; gap:var(--space-6); }
    .footer-links a { font-size:var(--text-sm); color:var(--muted); }
    .footer-links a:hover { color:var(--accent); }
    @media (max-width:768px) { .nav-actions .btn:not(.lang-toggle) { display:none; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="landing.html" class="nav-logo"><img src="../assets/presets/logo透明.png" alt="混沌艺术" class="nav-logo-img" style="height:28px;width:auto;display:block;" /></a>
      <nav class="nav-links" aria-label="主导航" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu">
        <a href="generate.html" data-i18n="navGenerate">图片生成</a>
        <a href="copy.html" data-i18n="navCopy">文案生成</a>

      </nav>
      <div class="nav-actions">
        <button type="button" class="btn btn-ghost lang-toggle" id="lang-toggle" data-i18n-attr="aria-label" data-i18n-aria-label="langSwitch" data-i18n="langEn">EN</button>
        <span class="nav-link-wrap"><a href="settings.html" class="btn btn-ghost" data-i18n="navSettings">设置</a><span class="update-badge" id="update-badge"></span></span>
        <div class="user-menu" id="user-menu"></div>
      </div>
      <button class="btn btn-ghost btn-icon nav-mobile-toggle" aria-label="打开菜单" data-i18n-attr="aria-label" data-i18n-aria-label="navMenu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
  </header>
  <main class="container">
    <header class="page-header">
      <div class="eyebrow" data-i18n="pagePresetStylesTitle">预设风格</div>
      <h1 data-i18n="pagePresetStylesTitle">预设风格</h1>
      <p class="lead" data-i18n="pagePresetStylesSubtitle">统一管理图片风格与文案风格预设。</p>
    </header>
    <div class="mode-tabs" role="tablist">
      <button type="button" class="mode-tab active" data-type="image" role="tab" data-i18n="presetStylesTabImage">图片风格</button>
      <button type="button" class="mode-tab" data-type="copy" role="tab" data-i18n="presetStylesTabCopy">文案风格</button>
    </div>

    <!-- Image Presets -->
    <section class="preset-section active" data-type="image">
      <div class="section-header">
        <h2 data-i18n="presetStylesImageTitle">图片风格预设</h2>
        <button type="button" class="btn btn-primary btn-sm" id="add-image-preset-btn" data-i18n="presetStylesImageAdd">新增图片风格</button>
      </div>
      <div class="edit-area" id="image-edit-area">
        <div class="field"><label data-i18n="presetStylesLabelName">名称</label><input type="text" id="image-edit-name" placeholder="例如：高端香水" data-i18n-attr="placeholder" data-i18n-placeholder="presetStylesNamePlaceholder" /></div>
        <div class="field"><label data-i18n="presetStylesLabelTag">标签</label><input type="text" id="image-edit-label" placeholder="例如：超写实 CG 渲染" data-i18n-attr="placeholder" data-i18n-placeholder="presetStylesTagPlaceholder" /></div>
        <div class="field"><label data-i18n="presetStylesLabelAspect">比例</label><select id="image-edit-aspect"><option value="9:16">9:16</option><option value="1:1">1:1</option><option value="21:9">21:9</option><option value="16:9">16:9</option><option value="4:5">4:5</option><option value="4:3">4:3</option></select></div>
        <div class="field"><label data-i18n="presetStylesLabelPrompt">提示词模板</label><textarea id="image-edit-prompt" rows="4"></textarea></div>
        <div class="field"><label data-i18n="presetStylesLabelCover">样板图片</label>
          <div id="image-edit-preview" style="width:100px;height:100px;border:2px dashed var(--border);border-radius:var(--border-radius);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg);">
            <span style="font-size:var(--text-xs);color:var(--muted);" data-i18n="presetStylesUploadHint">点击上传</span>
          </div>
          <input type="file" id="image-edit-upload" accept="image/*" style="display:none;" />
        </div>
        <div class="edit-actions">
          <button type="button" class="btn btn-primary" id="image-edit-save" data-i18n="presetStylesSave">保存</button>
          <button type="button" class="btn btn-ghost" id="image-edit-cancel" data-i18n="presetStylesCancel">取消</button>
        </div>
      </div>
      <div class="preset-grid" id="image-preset-grid"></div>
    </section>

    <!-- Copy Presets -->
    <section class="preset-section" data-type="copy">
      <div class="section-header">
        <h2 data-i18n="presetStylesCopyTitle">文案风格预设</h2>
        <button type="button" class="btn btn-primary btn-sm" id="add-copy-preset-btn" data-i18n="presetStylesCopyAdd">新增文案风格</button>
      </div>
      <div class="edit-area" id="copy-edit-area">
        <div class="field"><label data-i18n="presetStylesLabelName">名称</label><input type="text" id="copy-edit-name" placeholder="例如：知乎专栏" data-i18n-attr="placeholder" data-i18n-placeholder="presetStylesCopyNamePlaceholder" /></div>
        <div class="field"><label data-i18n="presetStylesLabelDesc">风格描述</label><textarea id="copy-edit-prompt" rows="3" placeholder="描述该风格的写作特点…" data-i18n-attr="placeholder" data-i18n-placeholder="presetStylesCopyDescPlaceholder"></textarea></div>
        <div class="edit-actions">
          <button type="button" class="btn btn-primary" id="copy-edit-save" data-i18n="presetStylesSave">保存</button>
          <button type="button" class="btn btn-ghost" id="copy-edit-cancel" data-i18n="presetStylesCancel">取消</button>
        </div>
      </div>
      <div class="copy-grid" id="copy-style-list"></div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-logo" data-i18n="brandName">混沌艺术</div>
      <nav class="footer-links">
        <a href="landing.html" data-i18n="navHome">首页</a>
        <a href="generate.html" data-i18n="navGenerate">图片生成</a>
        <a href="copy.html" data-i18n="navCopy">文案生成</a>
        <a href="preset-styles.html" data-i18n="navStyleManage">风格管理</a>
        <span class="nav-link-wrap"><a href="settings.html" data-i18n="navSettings">设置</a><span class="update-badge" id="update-badge"></span></span>
      </nav>
      <span class="body-sm brand-copyright" data-i18n="brandCopyright">Developed By ECHOHAORAN</span>
    </div>
  </footer>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script>
  (function() {
    'use strict';
    var DEFAULT_IMAGE_PRESETS = [
      { id:'perfume', name:'高端香水', label:'超写实 CG 渲染', aspect:'9:16', prompt:'A premium luxury perfume poster ad, ultra realistic CG render, a tall glass perfume bottle with deep amber liquid inside, surrounded by suspended water droplets catching the light, dark velvet background, golden volumetric light beams, hyper realistic product photography.' },
      { id:'coffee', name:'精品咖啡', label:'1950s 复古插画', aspect:'1:1', prompt:'A retro vintage coffee shop advertisement poster in 1950s mid-century modern illustration style, hand drawn with textured paper grain, warm pastel color palette, a steaming ceramic coffee cup on a small round table by a window.' },
      { id:'sneaker', name:'街头运动鞋', label:'都市纪实摄影', aspect:'21:9', prompt:'A gritty urban street photography sneaker advertisement, raw documentary photojournalism style, a single neon green and black running shoe lying on wet asphalt at night, reflections of city neon signs in the puddle beneath.' },
      { id:'techAi', name:'科技 / AI', label:'极简未来', aspect:'16:9', prompt:'A minimalist futuristic AI technology product poster, ultra clean geometric design, deep midnight black background with a single subtle horizon line glow, a translucent holographic sphere floating at center emitting soft cyan light particles.' },
      { id:'mooncake', name:'中式糕点', label:'水墨国风', aspect:'4:5', prompt:'A traditional Chinese mooncake poster advertisement in classical Chinese ink wash painting style, hand brushed with rice paper texture, soft sepia and charcoal tones with subtle vermillion red accents, a single round mooncake on an antique celadon porcelain plate.' },
    ];
var COPY_KEY = 'chaos_builder_copy_styles';
var IMAGE_CUSTOM_KEY = 'chaos_builder_image_custom_presets';
var DEFAULT_COPY = [{id:'weibo',name:'微博',prompt:'微博风格，短小精悍，适合碎片化阅读，可带话题标签。'},{id:'wechat',name:'微信公众号',prompt:'微信公众号风格，长文结构，有标题、分段、引用，专业深度。'},{id:'xiaohongshu',name:'小红书',prompt:'小红书风格，亲切口语化，善用emoji和换行，个人分享感强。'}];
var CURRENT_IMG_DATA = null; // data URI for upload

// IndexedDB — 用于存储预设封面图片（突破 5MB localStorage 限额）
var ImgDB = {
  DB_NAME: 'ChaosBuilderPresetImages', VER: 1, STORE: 'images',
  open: function() {
    return new Promise(function(res, rej) {
      var r = indexedDB.open(ImgDB.DB_NAME, ImgDB.VER);
      r.onupgradeneeded = function(e) { e.target.result.createObjectStore(ImgDB.STORE, { keyPath:'id' }); };
      r.onsuccess = function(e) { res(e.target.result); };
      r.onerror = function(e) { rej(e.target.error); };
    });
  },
  save: function(id, dataUrl) {
    return ImgDB.open().then(function(db) {
      return new Promise(function(res, rej) {
        var tx = db.transaction(ImgDB.STORE, 'readwrite');
        tx.objectStore(ImgDB.STORE).put({ id:id, data:dataUrl });
        tx.oncomplete = function() { res(); };
        tx.onerror = function(e) { rej(e.target.error); };
      });
    });
  },
  loadAll: function() {
    return ImgDB.open().then(function(db) {
      return new Promise(function(res, rej) {
        var tx = db.transaction(ImgDB.STORE, 'readonly');
        var r = tx.objectStore(ImgDB.STORE).getAll();
        r.onsuccess = function() { res(r.result || []); };
        r.onerror = function(e) { rej(e.target.error); };
      });
    });
  },
  remove: function(id) {
    return ImgDB.open().then(function(db) {
      return new Promise(function(res, rej) {
        var tx = db.transaction(ImgDB.STORE, 'readwrite');
        tx.objectStore(ImgDB.STORE).delete(id);
        tx.oncomplete = function() { res(); };
        tx.onerror = function(e) { rej(e.target.error); };
      });
    });
  },
};
// 同步缓存：startup 时从 IndexedDB 加载到内存,后续同步读取
var imgDataCache = {};
function initImgCache() {
  ImgDB.loadAll().then(function(entries) {
    entries.forEach(function(e) { imgDataCache[e.id] = e.data; });
    renderImg();
  }).catch(function() {});
}

    // Tabs
    document.querySelectorAll('.mode-tab').forEach(function(t) {
      t.addEventListener('click', function() {
        document.querySelectorAll('.mode-tab').forEach(function(x) { x.classList.toggle('active', x===t); });
        document.querySelectorAll('.preset-section').forEach(function(s) { s.classList.toggle('active', s.dataset.type===t.dataset.type); });
      });
    });

    // Image presets — text in localStorage, images in IndexedDB
    function getImgCustom() {
      try {
        var raw = JSON.parse(localStorage.getItem(IMAGE_CUSTOM_KEY));
        if (raw) {
          // 从同步缓存中补上 imgData
          return raw.map(function(p) {
            if (imgDataCache[p.id]) { var c = {}; for(var k in p) c[k]=p[k]; c.imgData = imgDataCache[p.id]; return c; }
            return p;
          });
        }
        saveImgCustom(DEFAULT_IMAGE_PRESETS);
        return DEFAULT_IMAGE_PRESETS;
      } catch(e){ saveImgCustom(DEFAULT_IMAGE_PRESETS); return DEFAULT_IMAGE_PRESETS; }
    }
    function saveImgCustom(l) {
      // 分离文本和图片数据
      var textOnly = l.map(function(p) {
        var c = {}; for(var k in p) if(k!=='imgData') c[k]=p[k]; return c;
      });
      try { localStorage.setItem(IMAGE_CUSTOM_KEY, JSON.stringify(textOnly)); } catch(e) { alert(I18N.t('presetStylesErrorStorage', '保存失败：存储空间不足')); return; }
      // 图片存入 IndexedDB（~数百 MB 限额）
      l.forEach(function(p) {
        if (p.imgData && p.imgData !== imgDataCache[p.id]) {
          imgDataCache[p.id] = p.imgData;
          ImgDB.save(p.id, p.imgData).catch(function(){});
        }
      });
    }

    var editImgId = null;
    function renderImg() {
      var grid = document.getElementById('image-preset-grid');
      grid.innerHTML = ''; var imgMap = { perfume:'perfume.png', coffee:'coffee.png', sneaker:'sneaker.png', techAi:'techai.png', mooncake:'mooncake.png' };
      getImgCustom().forEach(function(p) {
        var imgSrc = '';
        if (imgMap[p.id]) imgSrc = '../assets/presets/' + imgMap[p.id];
        else if (p.imgData) imgSrc = p.imgData;
        var c = document.createElement('div'); c.className = 'preset-card';
        c.innerHTML = '<div class="card-content"><div class="card-name">'+esc(p.name)+'</div><div class="card-meta">'+esc(p.label||'')+' · '+(p.aspect||'')+'</div><div class="card-prompt">'+esc(p.prompt)+'</div><div class="card-actions"><button type="button" class="btn btn-secondary btn-sm" data-action="edit" data-id="'+p.id+'">编辑</button><button type="button" class="btn btn-ghost btn-sm" data-action="delete" data-id="'+p.id+'">删除</button></div></div>' + (imgSrc ? '<div class="card-preview"><img src="'+imgSrc+'" alt="'+esc(p.name)+'" data-lightbox /></div>' : '');
        c.querySelector('[data-action="edit"]').onclick = function() { startEditImg(p.id); };
        c.querySelector('[data-action="delete"]').onclick = function() { if (confirm(I18N.t('presetStylesDeleteConfirm', '确定删除') + '「' + p.name + '」？')) { delete imgDataCache[p.id]; ImgDB.remove(p.id).catch(function(){}); saveImgCustom(getImgCustom().filter(function(x){return x.id!==p.id;})); renderImg(); } };
        var previewImg = c.querySelector('[data-lightbox]');
        if (previewImg) previewImg.onclick = function(e) { e.stopPropagation(); openLightbox(imgSrc); };
        grid.appendChild(c);
      });
    }
    function openLightbox(src) { var o=document.createElement('div'); o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;'; var i=document.createElement('img'); i.src=src; i.style.cssText='max-width:90vw;max-height:90vh;border-radius:8px;'; o.appendChild(i); o.onclick=function(){document.body.removeChild(o);}; document.body.appendChild(o); }

    function startEditImg(id) {
      editImgId = id; var a=document.getElementById('image-edit-area'); a.classList.add('open');
      CURRENT_IMG_DATA = null;
      document.getElementById('image-edit-upload').value = '';
      var preview = document.getElementById('image-edit-preview');
      var imgMap = { perfume:'perfume.png', coffee:'coffee.png', sneaker:'sneaker.png', techAi:'techai.png', mooncake:'mooncake.png' };
      if (id==='NEW') { ['name','label','prompt'].forEach(function(f){document.getElementById('image-edit-'+f).value='';}); document.getElementById('image-edit-aspect').value='1:1'; preview.innerHTML = '<span style="font-size:var(--text-xs);color:var(--muted);">' + I18N.t('presetStylesUploadHint', '点击上传') + '</span>'; return; }
      var all=getImgCustom();
      for(var i=0;i<all.length;i++) if(all[i].id===id) {
        document.getElementById('image-edit-name').value=all[i].name;
        document.getElementById('image-edit-label').value=all[i].label||'';
        document.getElementById('image-edit-aspect').value=all[i].aspect||'1:1';
        document.getElementById('image-edit-prompt').value=all[i].prompt;
        var imgSrc = (imgMap[id] ? '../assets/presets/' + imgMap[id] : null) || all[i].imgData || null;
        if (imgSrc) { CURRENT_IMG_DATA = imgSrc; preview.innerHTML = '<img src="'+imgSrc+'" style="width:100%;height:100%;object-fit:cover;" />'; }
        else { preview.innerHTML = '<span style="font-size:var(--text-xs);color:var(--muted);">' + I18N.t('presetStylesUploadHint', '点击上传') + '</span>'; }
        return;
      }
    }

    // Image upload handler — compress before saving to localStorage
    document.getElementById('image-edit-upload').onchange = function() {
      var file = this.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        CURRENT_IMG_DATA = e.target.result;
        document.getElementById('image-edit-preview').innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;" />';
      };
      reader.readAsDataURL(file);
    };
    document.getElementById('image-edit-preview').onclick = function() { document.getElementById('image-edit-upload').click(); };

    document.getElementById('add-image-preset-btn').onclick = function() { startEditImg('NEW'); };
    document.getElementById('image-edit-save').onclick = function() {
      var n=document.getElementById('image-edit-name').value.trim(), l=document.getElementById('image-edit-label').value.trim(), a=document.getElementById('image-edit-aspect').value, p=document.getElementById('image-edit-prompt').value.trim();
      if(!n||!p){alert(I18N.t('presetStylesErrorRequired', '名称和提示词不能为空'));return;} var list=getImgCustom();
      var obj = {id:editImgId==='NEW'?'img_'+Date.now():editImgId, name:n, label:l, aspect:a, prompt:p};
      if (CURRENT_IMG_DATA) obj.imgData = CURRENT_IMG_DATA;
      if(editImgId==='NEW') { list.push(obj); }
      else { var found=false; for(var i=0;i<list.length;i++) if(list[i].id===editImgId) { list[i]=obj; found=true; break; } if(!found) { obj.id='img_'+Date.now(); list.push(obj); } }
      saveImgCustom(list); document.getElementById('image-edit-area').classList.remove('open'); editImgId=null; renderImg();
    };
    document.getElementById('image-edit-cancel').onclick = function() { document.getElementById('image-edit-area').classList.remove('open'); editImgId=null; };

    // Copy presets
    function getCopy() {
      try {
        var raw = JSON.parse(localStorage.getItem(COPY_KEY));
        if (raw) return raw;
        saveCopy(DEFAULT_COPY);
        return DEFAULT_COPY;
      } catch(e){ saveCopy(DEFAULT_COPY); return DEFAULT_COPY; }
    }
    function saveCopy(l) { localStorage.setItem(COPY_KEY, JSON.stringify(l)); }
    var editCopyId = null;
    function renderCopy() {
      var list = document.getElementById('copy-style-list'); var all = getCopy(); list.innerHTML = '';
      if (all.length===0) { list.innerHTML = '<div style="text-align:center;padding:var(--space-8);color:var(--muted);">' + I18N.t('presetStylesCopyEmpty', '暂无文案风格，点击上方按钮新增。') + '</div>'; return; }
      all.forEach(function(p) {
        var card = document.createElement('div'); card.className = 'copy-card';
        card.innerHTML = '<div class="card-name">'+esc(p.name)+'</div><div class="card-prompt">'+esc(p.prompt)+'</div><div class="card-actions"><button type="button" class="btn btn-secondary btn-sm" data-action="edit" data-id="'+p.id+'">编辑</button><button type="button" class="btn btn-ghost btn-sm btn-danger" data-action="delete" data-id="'+p.id+'">删除</button></div>';
        card.querySelector('[data-action="edit"]').onclick=function(){startEditCopy(p.id);};
        card.querySelector('[data-action="delete"]').onclick=function(){if(confirm(I18N.t('presetStylesDeleteConfirm', '确定删除') + '「' + p.name + '」？')){saveCopy(getCopy().filter(function(x){return x.id!==p.id;}));renderCopy();}};
        list.appendChild(card);
      });
    }
    function startEditCopy(id) {
      editCopyId=id; var a=document.getElementById('copy-edit-area'); a.classList.add('open');
      if(id==='NEW'){document.getElementById('copy-edit-name').value='';document.getElementById('copy-edit-prompt').value='';return;}
      var list=getCopy(); for(var i=0;i<list.length;i++) if(list[i].id===id){document.getElementById('copy-edit-name').value=list[i].name;document.getElementById('copy-edit-prompt').value=list[i].prompt;return;}
    }
    document.getElementById('add-copy-preset-btn').onclick=function(){startEditCopy('NEW');};
    document.getElementById('copy-edit-save').onclick=function(){
      var n=document.getElementById('copy-edit-name').value.trim(), p=document.getElementById('copy-edit-prompt').value.trim();
      if(!n||!p){alert(I18N.t('presetStylesErrorCopyRequired', '名称和描述不能为空'));return;} var list=getCopy();
      if(editCopyId==='NEW') list.push({id:'copy_'+Date.now(),name:n,prompt:p});
      else for(var i=0;i<list.length;i++) if(list[i].id===editCopyId){list[i]={id:editCopyId,name:n,prompt:p};break;}
      saveCopy(list); document.getElementById('copy-edit-area').classList.remove('open'); editCopyId=null; renderCopy();
    };
    document.getElementById('copy-edit-cancel').onclick=function(){document.getElementById('copy-edit-area').classList.remove('open');editCopyId=null;};

    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function ut(){document.title=(I18N.t('brandNameFull','混沌艺术')||'混沌艺术')+' · '+I18N.t('pagePresetStylesTitle','预设风格');}
    function utl(){var b=document.getElementById('lang-toggle');if(b)b.textContent=I18N.locale()==='en'?'中':'EN';}

    Auth.requireAuth(); Auth.renderUserMenu('#user-menu');
    renderImg(); initImgCache(); renderCopy(); ut(); utl(); if (window.I18N) I18N.apply();
    document.getElementById('lang-toggle').onclick=function(){I18N.toggle();};
    document.addEventListener('i18n:changed',function(){ut();utl();});
  })();
  </script>
</body>
</html>
